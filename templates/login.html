<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;
background:linear-gradient(135deg,#0f172a,#2563eb,#60a5fa);font-family:Arial}

.box{background:#fff;padding:30px;border-radius:10px;width:300px}
input{width:100%;padding:10px;margin:10px 0}
button{width:100%;padding:10px;background:#2563eb;color:#fff;border:0}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">
<input name="email" placeholder="Email">
<input name="senha" type="password" placeholder="Senha">
<button>Entrar</button>
</form>

</div>

</body>
</html>
