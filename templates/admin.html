<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   BASE
========================= */
body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background:#070A12;
    color:#E5E7EB;
}

html{
    scroll-behavior:smooth;
}

/* =========================
   TOPBAR
========================= */
.topbar{
    background:rgba(10,15,30,0.75);
    backdrop-filter: blur(14px);
    border-bottom:1px solid rgba(255,255,255,0.06);

    padding:18px 6%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.topbar h1{
    font-size:16px;
    color:white;
}

.topbar a{
    color:white;
    text-decoration:none;
    background:rgba(99,102,241,0.2);
    border:1px solid rgba(99,102,241,0.4);
    padding:8px 14px;
    border-radius:10px;
}

/* =========================
   CONTAINER
========================= */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:0 20px;
}

/* =========================
   MENU GRID
========================= */
.menu-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:22px;
}

@media(max-width:900px){
    .menu-grid{
        grid-template-columns:1fr;
    }
}

/* =========================
   MENU CARD PREMIUM
========================= */
.menu-card{
    position:relative;
    overflow:hidden;

    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;

    padding:22px;
    text-decoration:none;
    color:white;

    transition:0.35s ease;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.menu-card:hover{
    transform:translateY(-8px) scale(1.01);
    border-color:#6366F1;
    box-shadow:0 18px 45px rgba(99,102,241,0.20);
}

/* brilho */
.menu-card::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:100%;
    height:100%;
    background:linear-gradient(90deg, transparent, rgba(99,102,241,0.10), transparent);
    transition:0.6s;
}

.menu-card:hover::before{
    left:120%;
}

/* linha inferior */
.menu-card::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:2px;
    background:linear-gradient(90deg, transparent, #6366F1, transparent);
    opacity:0;
    transition:0.3s;
}

.menu-card:hover::after{
    opacity:1;
}

/* =========================
   ICON
========================= */
.icon{
    width:46px;
    height:46px;
    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:14px;

    background:rgba(99,102,241,0.12);
    border:1px solid rgba(99,102,241,0.25);

    color:#6366F1;
    font-size:20px;

    transition:0.3s;
}

.menu-card:hover .icon{
    background:rgba(99,102,241,0.2);
    box-shadow:0 0 20px rgba(99,102,241,0.25);
    transform:scale(1.05);
}

/* =========================
   TEXTOS
========================= */
.menu-card h3{
    margin:0;
    font-size:1.05rem;
    font-weight:600;
}

.menu-card p{
    margin:0;
    font-size:0.9rem;
    color:#A1A1AA;
}

/* =========================
   SEÇÕES
========================= */
section{
    margin-top:80px;
}

.section-title{
    font-size:1.3rem;
    margin-bottom:20px;
    color:white;
}

/* CARD FORM */
.card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:16px;
    padding:25px;
    margin-bottom:20px;
}

/* INPUTS */
input, textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.03);
    color:white;
    outline:none;
}

textarea{
    height:120px;
    resize:none;
}

/* BOTÃO */
button{
    background:linear-gradient(135deg,#6366F1,#4F46E5);
    border:none;
    padding:12px 16px;
    border-radius:12px;
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(99,102,241,0.25);
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <h1>Painel Administrativo</h1>
    <a href="/logout">Sair</a>
</div>

<div class="container">

    <!-- MENU -->
    <div class="menu-grid">

        <a href="/admin/perfil" class="menu-card">
            <div class="icon"><i class="fa-solid fa-user"></i></div>
            <h3>Perfil</h3>
            <p>Editar informações pessoais</p>
        </a>

        <a href="/admin/formacao" class="menu-card">
            <div class="icon"><i class="fa-solid fa-graduation-cap"></i></div>
            <h3>Formação</h3>
            <p>Cursos e educação</p>
        </a>

        <a href="/admin/trabalhos" class="menu-card">
            <div class="icon"><i class="fa-solid fa-briefcase"></i></div>
            <h3>Trabalhos</h3>
            <p>Experiência profissional</p>
        </a>

        <a href="/admin/projetos" class="menu-card">
            <div class="icon"><i class="fa-solid fa-images"></i></div>
            <h3>Portfólio</h3>
            <p>Projetos e trabalhos</p>
        </a>

        <a href="/admin/contato" class="menu-card">
            <div class="icon"><i class="fa-solid fa-envelope"></i></div>
            <h3>Contato</h3>
            <p>Redes sociais e email</p>
        </a>

        <a href="/admin/configuracoes" class="menu-card">
            <div class="icon"><i class="fa-solid fa-gear"></i></div>
            <h3>Configurações</h3>
            <p>Upload e ajustes gerais</p>
        </a>

    </div>

</body>
</html>
