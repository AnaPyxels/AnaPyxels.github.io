<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editar Formação</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background:#070A12;
    color:#E5E7EB;
}

/* CONTAINER */
.container{
    max-width:700px;
    margin:50px auto;
    padding:0 20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:30px;
    position:relative;
}

/* TOP BORDER */
.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:2px;
    background:linear-gradient(90deg, transparent, #6366F1, transparent);
}

/* TITLE */
h2{
    margin:0 0 25px 0;
    font-size:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

h2 i{
    color:#6366F1;
}

/* FORM GRID */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.form-grid .full{
    grid-column:1 / -1;
}

/* INPUTS */
input{
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.03);
    color:white;
    outline:none;
    transition:.3s;
    box-sizing:border-box;
}

input:focus{
    border-color:#6366F1;
    box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

/* LABEL */
label{
    font-size:12px;
    color:#A1A1AA;
    margin-top:10px;
    display:block;
}

/* IMAGE */
.preview{
    margin-top:10px;
    padding:12px;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    display:inline-block;
}

.preview img{
    width:120px;
    border-radius:10px;
}

/* BUTTON AREA */
.actions{
    display:flex;
    gap:10px;
    margin-top:20px;
}

/* BUTTONS */
button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#6366F1,#4F46E5);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(99,102,241,0.25);
}

.cancel{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    color:#A1A1AA;
    font-weight:600;
    transition:.3s;
}

.cancel:hover{
    color:white;
    background:rgba(255,255,255,0.08);
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2><i class="fa-solid fa-pen-to-square"></i> Editar Formação</h2>

        <form method="POST" enctype="multipart/form-data"
              action="/editar_formacao/{{ f.id }}">

            <div class="form-grid">

                <div class="full">
                    <label>Curso</label>
                    <input name="curso" value="{{ f.curso }}" required>
                </div>

                <div>
                    <label>Instituição</label>
                    <input name="instituicao" value="{{ f.instituicao }}" required>
                </div>

                <div>
                    <label>Situação</label>
                    <input name="situacao" value="{{ f.situacao }}" required>
                </div>

                <div class="full">
                    <label>Conclusão</label>
                    <input name="conclusao" value="{{ f.conclusao }}" required>
                </div>

                <div class="full">
                    <label>Imagem</label>

                    {% if f.imagem %}
                        <div class="preview">
                            <img src="{{ url_for('static', filename=f.imagem) }}">
                        </div>
                    {% endif %}

                    <input type="file" name="imagem">
                </div>

            </div>

            <div class="actions">

                <button type="submit">
                    <i class="fa-solid fa-floppy-disk"></i> Salvar
                </button>

                <a href="/admin/formacao" class="cancel">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
