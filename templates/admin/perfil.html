<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin - Perfil</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   BASE
========================= */
body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background:#070A12;
    color:#E5E7EB;
}

/* =========================
   TOPBAR
========================= */
.topbar{
    background:rgba(10,15,30,0.75);
    backdrop-filter: blur(14px);
    border-bottom:1px solid rgba(255,255,255,0.06);

    padding:18px 6%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.topbar div{
    font-size:15px;
    font-weight:600;
    color:white;
}

.topbar a{
    color:white;
    text-decoration:none;
    background:rgba(99,102,241,0.2);
    border:1px solid rgba(99,102,241,0.4);
    padding:8px 14px;
    border-radius:10px;
    transition:.3s;
}

.topbar a:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(99,102,241,0.2);
}

/* =========================
   CONTAINER
========================= */
.container{
    max-width:850px;
    margin:40px auto;
    padding:0 20px;
}

/* =========================
   CARD
========================= */
.card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:30px;
    position:relative;
    overflow:hidden;
}

/* glow leve */
.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:2px;
    background:linear-gradient(90deg, transparent, #6366F1, transparent);
}

/* =========================
   TITLE
========================= */
.title{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
    font-size:18px;
    font-weight:600;
}

.title i{
    color:#6366F1;
}

/* =========================
   INPUTS
========================= */
input, textarea{
    width:100%;
    padding:12px 14px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.03);
    color:white;
    outline:none;
    transition:.3s;
}

input:focus, textarea:focus{
    border-color:#6366F1;
    box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

textarea{
    height:140px;
    resize:none;
}

/* =========================
   BUTTON
========================= */
button{
    margin-top:10px;
    width:100%;
    padding:12px 16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#6366F1,#4F46E5);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(99,102,241,0.25);
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div><i class="fa-solid fa-user-pen"></i> Editar Perfil</div>
    <a href="/admin"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
</div>

<div class="container">

    <div class="card">

        <div class="title">
            <i class="fa-solid fa-id-card"></i>
            Informações do Perfil
        </div>

        <form action="{{ url_for('salvar_perfil') }}" method="POST">

            <input name="nome" value="{{ dados.nome }}" placeholder="Nome completo">

            <input name="cargo" value="{{ dados.cargo }}" placeholder="Cargo / Profissão">

            <input name="linkedin" value="{{ dados.linkedin }}" placeholder="LinkedIn">

            <input name="whatsapp" value="{{ dados.whatsapp }}" placeholder="WhatsApp">

            <input name="email" value="{{ dados.email }}" placeholder="Email">

            <textarea name="sobre" placeholder="Sobre você...">{{ dados.sobre }}</textarea>

            <button type="submit">
                <i class="fa-solid fa-floppy-disk"></i> Salvar Alterações
            </button>

        </form>

    </div>

</div>

</body>
</html>
