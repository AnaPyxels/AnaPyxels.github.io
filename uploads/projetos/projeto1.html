<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #070B16;
            --text: #fff;
            --muted: #b9c1d9;
            --card: rgba(255,255,255,.05);
            --border: rgba(255,255,255,.1);
            --gradient: linear-gradient(135deg, #4D8DFF, #8A5CFF);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            width: min(1000px, 92%);
            margin: auto;
        }

        /* HERO */
        .hero {
            padding: 120px 0 50px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        .gradient {
            background: var(--gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--muted);
            max-width: 700px;
            margin: auto;
            line-height: 1.8;
        }

        /* GALERIA */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 50px;
        }

        .gallery img {
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        /* INFO */
        .info {
            margin-top: 50px;
            padding: 30px;
            border-radius: 20px;
            background: var(--card);
            border: 1px solid var(--border);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .tags span {
            font-size: .8rem;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.1);
            color: var(--muted);
        }

        .back {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            color: white;
            padding: 12px 20px;
            border: 1px solid var(--border);
            border-radius: 999px;
        }

        @media(max-width:900px){
            .gallery{
                grid-template-columns:1fr;
            }

            .hero h1{
                font-size:2rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- HERO -->
        <div class="hero">
            <h1>GESTÃO DE <span class="gradient">INSTAGRAM</span></h1>
            <p>
                Aqui você descreve o projeto. Objetivo, estratégia, ferramentas e resultado.
            </p>
        </div>

        <!-- GALERIA -->
        <div class="gallery">
            <img src="../uploads/img/projeto1-1.jpg">
            <img src="../uploads/img/projeto1-2.jpg">
            <img src="../uploads/img/projeto1-3.jpg">
            <img src="../uploads/img/projeto1-4.jpg">
        </div>

        <!-- INFO -->
        <div class="info">
            <h3>Sobre o projeto</h3>
            <p style="color:var(--muted); line-height:1.8;">
                Texto detalhado do projeto aqui.
            </p>

            <div class="tags">
                <span>Social Media</span>
                <span>Canva</span>
                <span>Marketing</span>
            </div>
        </div>

        <a href="../index.html" class="back">← Voltar</a>

    </div>

</body>

</html>
